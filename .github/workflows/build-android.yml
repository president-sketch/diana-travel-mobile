name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_DOMAIN: fdianatravel.com

      - name: Remove unwanted permissions from AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Remove CAMERA, RECORD_AUDIO, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION
          sed -i '/<uses-permission android:name="android.permission.CAMERA"/d' $MANIFEST
          sed -i '/<uses-permission android:name="android.permission.RECORD_AUDIO"/d' $MANIFEST
          sed -i '/<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/d' $MANIFEST
          sed -i '/<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/d' $MANIFEST
          sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/d' $MANIFEST
          sed -i '/<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/d' $MANIFEST
          sed -i '/<uses-feature android:name="android.hardware.camera"/d' $MANIFEST
          echo "=== Final permissions in manifest ==="
          grep "uses-permission" $MANIFEST || echo "No permissions found"

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias diana-travel \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $GITHUB_WORKSPACE/release.keystore \
            -storepass Diana2024! \
            -keypass Diana2024! \
            -dname "CN=Diana Travel, OU=Mobile, O=Diana Travel, L=Beirut, ST=Beirut, C=LB"

      - name: Configure release signing in build.gradle
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          android.signingConfigs {
            release {
              storeFile = file("$System.env.GITHUB_WORKSPACE/release.keystore")
              storePassword = "Diana2024!"
              keyAlias = "diana-travel"
              keyPassword = "Diana2024!"
            }
          }
          android.buildTypes.release {
            signingConfig = android.signingConfigs.release
          }
          GRADLE

      - name: Build signed Android AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease -x lint
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: diana-travel-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
